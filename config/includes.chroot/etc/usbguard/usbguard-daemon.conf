# ArchonSync USBGuard policy — defends against BadUSB / "rubber ducky" attacks
# (a malicious USB pretending to be a keyboard that types commands).
#
# Devices present at first boot are allow-listed automatically by the
# archonsync-firstboot-security service BEFORE this daemon is enabled, so your
# own keyboard/mouse keep working. Anything plugged in afterwards is blocked
# until you approve it with:  archonsync-usb allow <id>
#
# (USBGuard is enabled by the first-boot service, never in the image build, so
# it can never lock out the device you installed from.)

RuleFile=/etc/usbguard/rules.conf
ImplicitPolicyTarget=block
PresentDevicePolicy=apply-policy
PresentControllerPolicy=keep
InsertedDevicePolicy=apply-policy
RestoreControllerDeviceState=false
DeviceManagerBackend=uevent
IPCAllowedUsers=root
IPCAllowedGroups=plugdev
IPCAccessControlFiles=/etc/usbguard/IPCAccessControl.d/
AuditBackend=LinuxAudit
HidePII=false
