[Theme]
Current=breeze

[Autologin]
# Default to KDE Plasma on WAYLAND — required for HDR and the smoothest
# gaming/compositing. In Plasma 6 (Debian trixie) the Wayland session IS
# `plasma.desktop` (under /usr/share/wayland-sessions/); the X11 session is
# `plasmax11.desktop`. The custom ArchonSync compositor stays selectable but
# nested-only until its bare-metal backend lands.
Session=plasma.desktop
