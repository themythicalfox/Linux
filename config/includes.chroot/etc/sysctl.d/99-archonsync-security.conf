# ArchonSync kernel hardening (maximum-lockdown profile).
#
# Tuned to be as strict as possible WITHOUT breaking this machine's job as a
# gaming + creative workstation:
#   * Unprivileged user namespaces stay ENABLED — Steam's pressure-vessel /
#     Proton and Flatpak/bubblewrap sandboxes require them.
#   * No setting here costs measurable FPS (memory-zeroing trade-offs that do
#     are handled as opt-in kernel boot flags in grub.d, not here).

# ---- Kernel information leaks -------------------------------------------------
# Hide kernel pointers and the kernel log from unprivileged users.
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
# Restrict perf to root only (perf has been a recurring local-privesc vector).
kernel.perf_event_paranoid = 3
# No runtime kernel replacement.
kernel.kexec_load_disabled = 1

# ---- Process / tracing isolation ---------------------------------------------
# A process may only be ptrace()'d by its direct parent (blocks cross-process
# memory scraping by malware running as your user).
kernel.yama.ptrace_scope = 2
# Full address-space layout randomisation.
kernel.randomize_va_space = 2
# Disable the magic SysRq key (raw keyboard -> kernel command surface).
kernel.sysrq = 0
# Don't auto-load TTY line disciplines on demand (a BadUSB / LPE surface).
dev.tty.ldisc_autoload = 0
# Block unprivileged userfaultfd, repeatedly abused to win exploit race windows.
vm.unprivileged_userfaultfd = 0

# ---- Core dumps ---------------------------------------------------------------
# setuid programs never dump core, so secrets can't leak into a dump file.
fs.suid_dumpable = 0

# ---- eBPF --------------------------------------------------------------------
kernel.unprivileged_bpf_disabled = 1
net.core.bpf_jit_harden = 2

# ---- Filesystem link/FIFO protections ----------------------------------------
fs.protected_symlinks = 1
fs.protected_hardlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2

# ---- Network: anti-spoofing, anti-flood, stealth -----------------------------
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
net.ipv4.tcp_syncookies = 1
# Protect against TIME-WAIT assassination.
net.ipv4.tcp_rfc1337 = 1
# Ignore ICMP broadcasts (smurf) and bogus error responses.
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1
# Log packets with impossible source addresses.
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1
# Drop ICMP redirects (MITM route injection).
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
# Reject source-routed packets.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0
# Don't accept IPv6 router advertisements.
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0
# ARP hardening (don't answer for addresses on other interfaces).
net.ipv4.conf.all.arp_ignore = 1
net.ipv4.conf.all.arp_announce = 2

# ---- IPv6 privacy ------------------------------------------------------------
# Prefer randomised temporary addresses so you aren't trackable by a
# MAC-derived IPv6 address across networks.
net.ipv6.conf.all.use_tempaddr = 2
net.ipv6.conf.default.use_tempaddr = 2
