# ArchonSync workstation tuning (64 GB-class machine).

# Steam/Proton: many Windows games (and the Steam runtime) need far more
# memory mappings than the kernel default. Same value SteamOS ships.
vm.max_map_count = 2147483642

# Plenty of RAM: keep working sets in memory, swap only under real pressure.
vm.swappiness = 10

# IDEs and engine asset watchers (VS Code, Unreal, Blender) need lots of
# inotify watches.
fs.inotify.max_user_watches = 1048576
fs.inotify.max_user_instances = 8192
