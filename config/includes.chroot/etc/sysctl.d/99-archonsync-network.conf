# ArchonSync network performance — high download speed + low latency.
#
# Pairs with the CAKE queue discipline (NetworkManager dispatcher) and the
# DSCP marking (nftables) that together prioritise gaming/Discord/streaming
# over background traffic so your foreground "steals" the connection.

# BBR congestion control + fair-queue scheduler: BBR keeps throughput high on
# real-world links; fq removes the queue that adds lag under load.
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Bigger socket buffers so fast connections (downloads, streams) fill the pipe.
net.core.rmem_max = 67108864
net.core.wmem_max = 67108864
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576
net.ipv4.tcp_rmem = 4096 1048576 33554432
net.ipv4.tcp_wmem = 4096 1048576 33554432
net.core.netdev_max_backlog = 16384
net.core.somaxconn = 8192

# Connect faster and recover faster.
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_mtu_probing = 1
# Don't collapse the congestion window after an idle moment (keeps games/voice
# responsive after a pause).
net.ipv4.tcp_slow_start_after_idle = 0
net.ipv4.tcp_notsent_lowat = 16384

# Modern loss recovery.
net.ipv4.tcp_ecn = 1
