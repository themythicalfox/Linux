# ArchonSync kernel command-line hardening (KSPP-aligned).
#
# These flags raise the cost of kernel/heap exploitation and block DMA attacks
# from malicious peripherals. They are chosen to NOT break this build's gaming
# role, so the following are deliberately OMITTED:
#   * lockdown=confidentiality / module.sig_enforce=1  -> would refuse to load
#     the unsigned NVIDIA driver (Secure Boot is off on this image).
#   * mitigations=...,nosmt                            -> disabling SMT costs
#     significant gaming FPS; default CPU mitigations stay on.
#   * init_on_free=1                                   -> measurable FPS cost;
#     left off here (add it below if you want absolute maximum at a perf cost).

ARCHON_HARDENING="\
slab_nomerge \
init_on_alloc=1 \
page_alloc.shuffle=1 \
randomize_kstack_offset=on \
vsyscall=none \
debugfs=off \
extra_latent_entropy \
intel_iommu=on \
amd_iommu=on \
efi=disable_early_pci_dma"

GRUB_CMDLINE_LINUX_DEFAULT="${GRUB_CMDLINE_LINUX_DEFAULT} ${ARCHON_HARDENING}"
