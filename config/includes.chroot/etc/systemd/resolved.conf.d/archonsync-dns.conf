# ArchonSync encrypted, malware-filtering DNS.
#
# All name lookups go out over DNS-over-TLS (encrypted, so your ISP/network
# can't see or tamper with them) to Quad9, whose resolver already BLOCKS known
# malware / phishing / command-and-control domains. Mullvad is the fallback,
# also DoT. DNSSEC validation is on so forged answers are rejected.
#
# This is the network-malware layer; the /etc/hosts blocklist
# (archonsync-blocklist) adds the ad/tracker layer on top.

[Resolve]
# Quad9 (malware-blocking) primary, Mullvad secondary — both DoT endpoints.
DNS=9.9.9.9#dns.quad9.net 2620:fe::fe#dns.quad9.net
FallbackDNS=194.242.2.2#dns.mullvad.net 2a07:e340::2#dns.mullvad.net
DNSOverTLS=yes
DNSSEC=allow-downgrade
# Don't leak single-label hostnames to the public resolver.
ResolveUnicastSingleLabel=no
# Cache locally to cut lookups (and exposure).
Cache=yes
